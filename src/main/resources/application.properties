spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
spring.profiles.active=prod
vaadin.launch-browser=true
spring.application.name=Entrance-Visitor-Display-New
spring.main.allow-bean-definition-overriding=true


# DATENBANK (H2 File Mode)

spring.datasource.url=${DB_DASHBOARD_URL}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_DASHBOARD_USER}
spring.datasource.password=${DB_DASHBOARD_PASSWORD}

# Hibernate (ORM)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2-Konsole im Browser aktivieren
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# SERVER HEADER
server.forward-headers-strategy=framework
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=x-forwarded-proto

